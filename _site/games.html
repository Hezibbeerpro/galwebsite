<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחקים | גל באר</title>
    
    <link rel="icon" href="favicon.png" type="image/png">
    
    <style>
        :root {
            --maccabi-green: #007A33;
            --maccabi-white: #FFFFFF;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: var(--maccabi-green);
            color: var(--maccabi-white);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-logo-name {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-logo-name img { height: 50px; width: auto; }
        .header-logo-name a { color: var(--maccabi-white); text-decoration: none; font-size: 24px; font-weight: bold; }
        nav a { color: var(--maccabi-white); text-decoration: none; margin-right: 20px; font-size: 18px; }
        nav a:hover { text-decoration: underline; }
        main {
            flex: 1;
            padding: 30px;
            background-color: var(--maccabi-white);
            margin: 20px auto;
            width: 80%;
            max-width: 1000px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        footer {
            background-color: var(--maccabi-green);
            color: var(--maccabi-white);
            text-align: center;
            padding: 15px;
            font-size: 16px;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo-name">
            <img src="logo.png" alt="מכבי חיפה">
            <a href="index.html">גל באר</a>
        </div>
        <nav>
            <a href="movies.html">סרטים</a>
            <a href="games.html">משחקים</a>
        </nav>
    </header>

    <main>
        <style>
    #game-container {
        text-align: center;
        margin-top: 10px;
    }
    
    .score-board {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 15px;
        color: var(--maccabi-green);
    }

    #game-area {
        width: 100%;
        max-width: 400px;
        height: 500px;
        background-color: #e9ecef;
        position: relative;
        margin: 0 auto;
        overflow: hidden;
        border: 4px solid var(--maccabi-green);
        border-radius: 10px;
        box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
        touch-action: none;
    }

    #ball {
        font-size: 50px;
        position: absolute;
        top: 0;
        left: 50%;
        cursor: pointer;
        user-select: none;
        transition: transform 0.1s;
    }

    #ball:active {
        transform: scale(0.8);
    }

    #start-btn {
        background-color: var(--maccabi-green);
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
        border-radius: 5px;
        margin-bottom: 20px;
    }

    #start-btn:hover {
        background-color: #005a25;
    }

    #leaderboard {
        margin: 30px auto;
        max-width: 300px;
        background: white;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        text-align: right;
    }

    #leaderboard h3 {
        color: var(--maccabi-green);
        text-align: center;
        margin-top: 0;
    }

    #high-score-list {
        list-style-type: none;
        padding: 0;
        margin: 0;
    }

    #high-score-list li {
        padding: 8px 0;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        font-size: 18px;
    }

    #high-score-list li:last-child {
        border-bottom: none;
    }

    .score-name { font-weight: bold; }
    .score-val { color: var(--maccabi-green); font-weight: bold; }

    @media (max-width: 768px) {
        main {
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;
            padding: 10px 0 !important;
            border-radius: 0 !important;
            box-shadow: none !important;
        }

        #game-area {
            height: 65vh;
            max-width: 100%;
            border-left: none;
            border-right: none;
            border-radius: 0;
        }

        h1, p {
            padding: 0 10px;
        }
    }
</style>

<h1>משחק נגיחות</h1>
<p>לחץ על הכדור לפני שהוא פוגע ברצפה!</p>

<div id="game-container">
    <button id="start-btn" onclick="startGame()">התחל משחק</button>
    
    <div class="score-board">
        נקודות: <span id="score">0</span>
    </div>

    <div id="game-area">
        <div id="ball" style="display: none;">⚽</div>
    </div>

    <div id="leaderboard">
        <h3>🏆 טבלת שיאים</h3>
        <ul id="high-score-list"></ul>
    </div>
</div>

<script>
    let score = 0;
    let ballY = 0;
    let speed = 2;
    let gameLoop;
    
    // הגדרת קובץ השמע המקומי
    const hitSound = new Audio('hit.mp3');
    
    const MAX_HIGH_SCORES = 5;
    let highScores = JSON.parse(localStorage.getItem('headingHighScores')) || [];

    const ball = document.getElementById('ball');
    const scoreDisplay = document.getElementById('score');
    const gameArea = document.getElementById('game-area');
    const startBtn = document.getElementById('start-btn');
    const highScoreList = document.getElementById('high-score-list');

    renderLeaderboard();

    function startGame() {
        score = 0;
        speed = 3;
        scoreDisplay.innerText = score;
        startBtn.style.display = 'none';
        ball.style.display = 'block';
        
        resetBall();
        
        clearInterval(gameLoop);
        gameLoop = setInterval(updateGame, 20);
    }

    function updateGame() {
        ballY += speed;
        ball.style.top = ballY + 'px';

        if (ballY > gameArea.offsetHeight - ball.offsetHeight) {
            gameOver();
        }
    }

    function resetBall() {
        ballY = 0;
        const maxX = gameArea.offsetWidth - ball.offsetWidth;
        const randomX = Math.floor(Math.random() * maxX);
        ball.style.left = randomX + 'px';
        ball.style.transform = 'none'; 
    }

    ball.addEventListener('mousedown', hitBall);
    ball.addEventListener('touchstart', function(e) {
        e.preventDefault();
        hitBall();
    });

    function hitBall() {
        // ניגון הסאונד
        hitSound.currentTime = 0; // איפוס להתחלה במקרה של לחיצות מהירות
        hitSound.play().catch(e => console.log('Audio error:', e)); // catch מונע שגיאות בדפדפנים שחוסמים סאונד אוטומטי
        
        score++;
        scoreDisplay.innerText = score;
        speed += 0.5; 
        resetBall();
    }

    function gameOver() {
        clearInterval(gameLoop);
        ball.style.display = 'none';
        startBtn.style.display = 'inline-block';
        startBtn.innerText = 'שחק שוב';

        setTimeout(() => {
            checkHighScore(score);
        }, 100);
    }

    function checkHighScore(finalScore) {
        const lowestScore = highScores[MAX_HIGH_SCORES - 1]?.score || 0;

        if (finalScore > 0 && (finalScore > lowestScore || highScores.length < MAX_HIGH_SCORES)) {
            const playerName = prompt(`משחק מצוין! השגת ${finalScore} נקודות ונכנסת לטבלת השיאים.\nאיך קוראים לך?`);
            
            if (playerName && playerName.trim() !== "") {
                const newScore = { score: finalScore, name: playerName.trim() };
                highScores.push(newScore);
                highScores.sort((a, b) => b.score - a.score);
                highScores.splice(MAX_HIGH_SCORES);
                localStorage.setItem('headingHighScores', JSON.stringify(highScores));
                renderLeaderboard();
            }
        } else {
            alert(`המשחק נגמר! השגת ${finalScore} נקודות.`);
        }
    }

    function renderLeaderboard() {
        highScoreList.innerHTML = highScores.map(entry => 
            `<li><span class="score-name">${entry.name}</span> <span class="score-val">${entry.score}</span></li>`
        ).join('');
        
        if (highScores.length === 0) {
            highScoreList.innerHTML = '<li><span style="color: gray; font-size: 14px;">עדיין אין שיאים. שחקו כדי להוביל!</span></li>';
        }
    }
</script>
    </main>

    <footer>
        <p>שמחים שביקרתם פה</p>
    </footer>

</body>
</html>
