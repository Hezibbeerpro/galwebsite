<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דף הבית | גל באר</title>
    
    <link rel="icon" href="favicon.png" type="image/png">
    
    <style>
        :root {
            --maccabi-green: #007A33;
            --maccabi-white: #FFFFFF;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: var(--maccabi-green);
            color: var(--maccabi-white);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-logo-name {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-logo-name img { height: 50px; width: auto; }
        .header-logo-name a { color: var(--maccabi-white); text-decoration: none; font-size: 24px; font-weight: bold; }
        nav a { color: var(--maccabi-white); text-decoration: none; margin-right: 20px; font-size: 18px; }
        nav a:hover { text-decoration: underline; }
        main {
            flex: 1;
            padding: 30px;
            background-color: var(--maccabi-white);
            margin: 20px auto;
            width: 80%;
            max-width: 1000px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        footer {
            background-color: var(--maccabi-green);
            color: var(--maccabi-white);
            text-align: center;
            padding: 15px;
            font-size: 16px;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo-name">
            <img src="logo.png" alt="מכבי חיפה">
            <a href="index.html">גל באר</a>
        </div>
        <nav>
            <a href="movies.html">סרטים</a>
            <a href="games.html">משחקים</a>
        </nav>
    </header>

    <main>
        <h1>ברוכים הבאים לאתר של גל!</h1>
<p>זהו דף הבית. כאן מוצג התוכן המרכזי של האתר.</p>
    </main>

    <footer>
        <p>שמחים שביקרתם פה</p>
    </footer>

</body>
</html>
